<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Group Idea Board</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0c29;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.12);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.4);
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'DM Sans', sans-serif;
      padding: 40px 20px 80px;
      position: relative;
      overflow-x: hidden;
      color: var(--text);
    }

    /* Orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: slideIn 0.6s ease both;
    }

    .header .label {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 4px;
      color: #48DBFB;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: clamp(32px, 7vw, 52px);
      font-weight: 700;
      line-height: 1.1;
    }

    .header h1 span {
      background: linear-gradient(90deg, #FF6B6B, #FECA57, #48DBFB);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    /* Member dots */
    .members-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .member-dot {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s, border-color 0.2s, background 0.2s;
    }

    .member-dot:hover { transform: scale(1.15); }
    .member-dot.active { transform: scale(1.25); }

    /* Name input */
    .name-input-wrap {
      position: relative;
      min-width: 150px;
    }
    .name-input-wrap input {
      width: 100%;
      padding-right: 36px;
    }
    .name-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      line-height: 1;
      display: none;
    }
    .name-clear:hover { color: #FF6B6B; }

    /* Suggestions dropdown */
    .suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #1e1b4b;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      overflow: hidden;
      z-index: 50;
      display: none;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }
    .suggestions.open { display: block; }
    .suggestion-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s;
    }
    .suggestion-item:hover { background: rgba(255,255,255,0.08); }
    .suggestion-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Input card */
    .input-card {
      background: var(--card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 28px;
      animation: slideIn 0.7s ease both;
    }

    .input-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    select, input[type="text"] {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: white;
      padding: 12px 16px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    select {
      min-width: 150px;
      cursor: pointer;
      font-weight: 600;
    }

    select option { background: #1a1a3e; color: white; }

    input[type="text"] {
      flex: 1;
      min-width: 180px;
    }

    input[type="text"]::placeholder { color: rgba(255,255,255,0.3); }
    input[type="text"]:focus { border-color: rgba(255,255,255,0.4); }

    .add-btn {
      background: linear-gradient(135deg, #48DBFB, #5F27CD);
      border: none;
      border-radius: 12px;
      color: white;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
      white-space: nowrap;
    }

    .add-btn:hover { transform: scale(1.05); filter: brightness(1.15); }

    .posting-as {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      display: none;
      align-items: center;
      gap: 8px;
    }

    /* Ideas list */
    #ideas-list { display: flex; flex-direction: column; gap: 12px; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.2);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    .idea-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      animation: fadeUp 0.4s ease both;
    }

    .idea-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      border: 2px solid transparent;
    }

    .idea-body { flex: 1; min-width: 0; }

    .idea-text {
      font-size: 15px;
      font-weight: 500;
      color: white;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .idea-meta {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .idea-meta .member-name { font-weight: 700; }

    .del-btn {
      background: rgba(255,100,100,0.12);
      border: 1px solid rgba(255,100,100,0.25);
      border-radius: 8px;
      color: #FF6B6B;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      opacity: 0.5;
      transition: opacity 0.2s, transform 0.2s;
      flex-shrink: 0;
    }

    .del-btn:hover { opacity: 1; transform: scale(1.1); }

    /* Stats */
    #stats-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid transparent;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: rgba(20,20,50,0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 14px 20px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      transform: translateX(200px);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: none;
    }

    #toast.show { transform: translateX(0); opacity: 1; }

    /* Animations */
    @keyframes slideIn {
      from { transform: translateY(-20px) scale(0.97); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes fadeUp {
      from { transform: translateY(24px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    @keyframes floatA { from { transform: translate(0,0); } to { transform: translate(30px, 40px); } }
    @keyframes floatB { from { transform: translate(0,0); } to { transform: translate(-25px, 30px); } }
    @keyframes floatC { from { transform: translate(0,0); } to { transform: translate(20px,-35px); } }
  </style>
</head>
<body>

<!-- Background orbs -->
<div class="orb" style="width:220px;height:220px;background:radial-gradient(circle,#FF6B6B33,transparent);top:8%;left:4%;animation:floatA 9s ease-in-out infinite alternate;"></div>
<div class="orb" style="width:180px;height:180px;background:radial-gradient(circle,#48DBFB22,transparent);top:55%;left:72%;animation:floatB 11s ease-in-out infinite alternate;"></div>
<div class="orb" style="width:260px;height:260px;background:radial-gradient(circle,#FECA5722,transparent);top:30%;left:38%;animation:floatC 8s ease-in-out infinite alternate;"></div>
<div class="orb" style="width:150px;height:150px;background:radial-gradient(circle,#1DD1A122,transparent);top:70%;left:12%;animation:floatA 10s ease-in-out infinite alternate;"></div>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="label">Collaborative</div>
    <h1>Group Idea <span>Board</span></h1>
    <div class="subtitle" id="subtitle">No ideas yet — be the first!</div>

    <div class="members-row" id="members-row" style="display:none"></div>
  </div>

  <!-- Input card -->
  <div class="input-card">
    <div class="input-row">
      <div class="name-input-wrap">
        <input type="text" id="member-name-input" placeholder="Your name..." maxlength="30" autocomplete="off"/>
        <button class="name-clear" id="name-clear" onclick="clearName()">✕</button>
        <div class="suggestions" id="suggestions"></div>
      </div>
      <input type="text" id="idea-input" placeholder="Share your idea with the group..." maxlength="200"/>
      <button class="add-btn" id="add-btn" onclick="addIdea()">+ Post Idea</button>
    </div>
    <div class="posting-as" id="posting-as">
      <span>Posting as <strong id="posting-name"></strong></span>
    </div>
  </div>

  <!-- Ideas -->
  <div id="ideas-list">
    <div class="empty-state">
      <div class="icon">💡</div>
      <div>The board is empty. Drop the first idea!</div>
    </div>
  </div>

  <!-- Stats -->
  <div id="stats-row"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const PRESET_COLORS = ["#FF6B6B","#FF9F43","#FECA57","#48DBFB","#1DD1A1","#54A0FF","#A29BFE","#FF9FF3","#00D2D3","#C8D6E5"];

  // Color assigned per unique name
  let nameRegistry = JSON.parse(localStorage.getItem("name-registry") || "{}");
  let ideas = JSON.parse(localStorage.getItem("group-ideas") || "[]");
  let selectedName = "";

  function getProfile(name) {
    if (!nameRegistry[name]) {
      const idx = Object.keys(nameRegistry).length % PRESET_COLORS.length;
      nameRegistry[name] = { color: PRESET_COLORS[idx] };
      localStorage.setItem("name-registry", JSON.stringify(nameRegistry));
    }
    return nameRegistry[name];
  }

  function getInitials(name) {
    return name.trim().split(/\s+/).map(w => w[0].toUpperCase()).slice(0,2).join("");
  }

  // Name input logic
  const nameInput = document.getElementById("member-name-input");
  const suggestionsEl = document.getElementById("suggestions");
  const clearBtn = document.getElementById("name-clear");

  nameInput.addEventListener("input", () => {
    const val = nameInput.value.trim();
    clearBtn.style.display = val ? "block" : "none";
    if (val) {
      applyName(val);
      showSuggestions(val);
    } else {
      selectedName = "";
      resetInputStyle();
      closeSuggestions();
      document.getElementById("posting-as").style.display = "none";
    }
  });

  nameInput.addEventListener("keydown", e => {
    if (e.key === "Enter") { closeSuggestions(); document.getElementById("idea-input").focus(); }
    if (e.key === "Escape") closeSuggestions();
  });

  nameInput.addEventListener("focus", () => {
    if (nameInput.value.trim()) showSuggestions(nameInput.value.trim());
  });

  document.addEventListener("click", e => {
    if (!e.target.closest(".name-input-wrap")) closeSuggestions();
  });

  function showSuggestions(val) {
    const lower = val.toLowerCase();
    const pastNames = [...new Set(ideas.map(i => i.member))];
    const matches = pastNames.filter(n => n.toLowerCase().includes(lower) && n !== val);
    if (matches.length === 0) { closeSuggestions(); return; }

    suggestionsEl.innerHTML = matches.slice(0, 6).map(n => {
      const p = getProfile(n);
      return `<div class="suggestion-item" onclick="pickSuggestion('${escapeHtml(n)}')">
        <div class="suggestion-dot" style="background:${p.color}"></div>
        <span>${escapeHtml(n)}</span>
      </div>`;
    }).join("");
    suggestionsEl.classList.add("open");
  }

  function closeSuggestions() { suggestionsEl.classList.remove("open"); }

  function pickSuggestion(name) {
    nameInput.value = name;
    applyName(name);
    closeSuggestions();
    clearBtn.style.display = "block";
    document.getElementById("idea-input").focus();
  }

  function clearName() {
    nameInput.value = "";
    selectedName = "";
    clearBtn.style.display = "none";
    resetInputStyle();
    document.getElementById("posting-as").style.display = "none";
    closeSuggestions();
    nameInput.focus();
  }

  function applyName(name) {
    selectedName = name;
    const profile = getProfile(name);
    nameInput.style.borderColor = profile.color;
    nameInput.style.color = profile.color;
    document.getElementById("add-btn").style.background =
      "linear-gradient(135deg," + profile.color + "," + profile.color + "88)";

    const pa = document.getElementById("posting-as");
    pa.style.display = "flex";
    pa.style.color = profile.color + "cc";
    document.getElementById("posting-name").textContent = name;
    document.getElementById("posting-name").style.color = profile.color;
  }

  function resetInputStyle() {
    nameInput.style.borderColor = "rgba(255,255,255,0.15)";
    nameInput.style.color = "white";
    document.getElementById("add-btn").style.background = "linear-gradient(135deg,#48DBFB,#5F27CD)";
  }

  function formatDateTime(ts) {
    const d = new Date(ts);
    const date = d.toLocaleDateString([], { month:"short", day:"numeric", year:"numeric" });
    const time = d.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
    return date + " • " + time;
  }

  function addIdea() {
    const input = document.getElementById("idea-input");
    const text = input.value.trim();
    const name = nameInput.value.trim();
    if (!name) { showToast("Enter your name first!"); nameInput.focus(); return; }
    if (!text) { showToast("Write an idea first!"); return; }

    selectedName = name;
    ideas.unshift({ id: Date.now(), member: name, text });
    localStorage.setItem("group-ideas", JSON.stringify(ideas));
    input.value = "";
    renderIdeas();
    showToast("Idea posted!");
  }

  document.getElementById("idea-input").addEventListener("keydown", e => {
    if (e.key === "Enter") addIdea();
  });

  function deleteIdea(id) {
    ideas = ideas.filter(i => i.id !== id);
    localStorage.setItem("group-ideas", JSON.stringify(ideas));
    renderIdeas();
  }

  function renderIdeas() {
    const list = document.getElementById("ideas-list");
    const subtitle = document.getElementById("subtitle");
    const statsRow = document.getElementById("stats-row");

    subtitle.textContent = ideas.length === 0
      ? "No ideas yet — be the first!"
      : ideas.length + " idea" + (ideas.length !== 1 ? "s" : "") + " from the group";

    if (ideas.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">💡</div><div>The board is empty. Drop the first idea!</div></div>`;
      statsRow.innerHTML = "";
      return;
    }

    list.innerHTML = ideas.map((item, idx) => {
      const p = getProfile(item.member);
      const initials = getInitials(item.member);
      return `
      <div class="idea-card" style="border-left:4px solid ${p.color};animation-delay:${idx*0.05}s">
        <div class="avatar" style="background:${p.color}22;border-color:${p.color};color:${p.color};font-size:14px;font-weight:700;letter-spacing:0.5px">${initials}</div>
        <div class="idea-body">
          <div class="idea-text">${escapeHtml(item.text)}</div>
          <div class="idea-meta">
            <span class="member-name" style="color:${p.color}">${escapeHtml(item.member)}</span>
            <span>·</span>
            <span>${formatDateTime(item.id)}</span>
          </div>
        </div>
        <button class="del-btn" onclick="deleteIdea(${item.id})" title="Remove">✕</button>
      </div>`;
    }).join("");

    // Stats
    const memberCounts = {};
    ideas.forEach(i => memberCounts[i.member] = (memberCounts[i.member] || 0) + 1);
    statsRow.innerHTML = Object.entries(memberCounts).map(([m, count]) => {
      const p = getProfile(m);
      return `<div class="stat-chip" style="background:${p.color}22;border-color:${p.color}44;color:${p.color}">
        <span>${escapeHtml(m)}: ${count}</span>
      </div>`;
    }).join("");
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
  }

  renderIdeas();
</script>
</body>
</html>
